<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040b14"/>
      <stop offset="50%" stop-color="#0a1c2b"/>
      <stop offset="100%" stop-color="#03070d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Speedometer Graphic -->
  <g transform="translate(400, 270)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.2"/>
    <path d="M -140 0 A 140 140 0 1 1 140 0" fill="none" stroke="#10b981" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Needle pointing to 100% -->
    <line x1="0" y1="0" x2="90" y2="-90" stroke="#34d399" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="16" fill="#10b981"/>

    <text x="0" y="60" fill="#ffffff" font-family="sans-serif" font-size="36" font-weight="900" text-anchor="middle">100 / 100</text>
    <text x="0" y="85" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="2">CORE WEB VITALS PASSED</text>
  </g>

  <!-- Speed Metrics Badges -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="180" height="70" rx="14" fill="#0d241d" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="30" fill="#a7f3d0" font-family="sans-serif" font-size="10">Page Load Speed</text>
    <text x="20" y="55" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="bold">0.8 Seconds</text>
  </g>

  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="180" height="70" rx="14" fill="#0d241d" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
    <text x="20" y="30" fill="#a7f3d0" font-family="sans-serif" font-size="10">Bounce Rate</text>
    <text x="20" y="55" fill="#34d399" font-family="sans-serif" font-size="22" font-weight="bold">-42% Drop</text>
  </g>

  <!-- Title Badge -->
  <rect x="30" y="30" width="340" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="200" y="50" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">SHOPIFY SPEED OPTIMIZATION</text>
</svg>
