<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0b172a"/>
      <stop offset="100%" stop-color="#040710"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="550" cy="250" r="240" fill="#10b981" opacity="0.08" filter="url(#glow)"/>

  <!-- Speed Lines -->
  <path d="M 50 280 H 350 M 80 310 H 380 M 30 340 H 320" stroke="#10b981" stroke-width="3" stroke-dasharray="15,10" stroke-linecap="round" opacity="0.6"/>

  <!-- High-Tech Delivery Truck Graphic -->
  <g transform="translate(320, 160)">
    <!-- Main Body -->
    <rect x="0" y="0" width="280" height="150" rx="16" fill="#0f231e" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <rect x="220" y="30" width="80" height="120" rx="12" fill="#061210" stroke="#10b981" stroke-width="2"/>

    <!-- Windshield & Lights -->
    <rect x="235" y="45" width="50" height="40" rx="6" fill="#10b981" opacity="0.3"/>
    <circle cx="290" cy="115" r="8" fill="#fbbf24" filter="url(#glow)"/>

    <!-- Wheels -->
    <circle cx="70" cy="150" r="28" fill="#040810" stroke="#10b981" stroke-width="4"/>
    <circle cx="70" cy="150" r="10" fill="#10b981"/>

    <circle cx="230" cy="150" r="28" fill="#040810" stroke="#10b981" stroke-width="4"/>
    <circle cx="230" cy="150" r="10" fill="#10b981"/>

    <!-- Graphics / Text on Body -->
    <text x="25" y="55" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="2">EXPRESS LOGISTICS</text>
    <text x="25" y="75" fill="#a7f3d0" font-family="sans-serif" font-size="10">24,000+ PINCODES COVERED</text>
    <rect x="25" y="90" width="110" height="24" rx="6" fill="#10b981" opacity="0.2"/>
    <text x="35" y="106" fill="#34d399" font-family="sans-serif" font-size="10" font-weight="bold">RTO GUARD Active</text>
  </g>

  <!-- Floating Courier Badges -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="160" height="55" rx="12" fill="#0c182b" stroke="#ffffff" stroke-opacity="0.1" filter="url(#glow)"/>
    <text x="20" y="28" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">Shiprocket</text>
    <text x="20" y="43" fill="#10b981" font-family="sans-serif" font-size="9">Multi-Courier Routing</text>
  </g>

  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="160" height="55" rx="12" fill="#0c182b" stroke="#ffffff" stroke-opacity="0.1" filter="url(#glow)"/>
    <text x="20" y="28" fill="#38bdf8" font-family="sans-serif" font-size="13" font-weight="bold">Delhivery</text>
    <text x="20" y="43" fill="#a7f3d0" font-family="sans-serif" font-size="9">Enterprise Express</text>
  </g>

  <!-- Title Badge -->
  <rect x="30" y="30" width="320" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="190" y="50" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">E-COMMERCE SHIPPING & LOGISTICS</text>
</svg>
