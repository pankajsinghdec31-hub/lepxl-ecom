<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c17"/>
      <stop offset="50%" stop-color="#0a1827"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#152e28"/>
      <stop offset="100%" stop-color="#0a1915"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="250" fill="#10b981" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="350" r="220" fill="#14b8a6" opacity="0.08" filter="url(#glow)"/>

  <!-- Grid Lines -->
  <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800 M200 0 V500 M400 0 V500 M600 0 V500" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Phone Container -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="220" height="380" rx="32" fill="#0c1421" stroke="#10b981" stroke-width="2" stroke-opacity="0.5"/>
    <rect x="80" y="12" width="60" height="12" rx="6" fill="#10b981" opacity="0.4"/>
    
    <!-- Phone Screen UI -->
    <rect x="15" y="40" width="190" height="320" rx="20" fill="#060c14"/>
    <rect x="25" y="60" width="170" height="40" rx="10" fill="#10b981" opacity="0.15"/>
    <text x="40" y="85" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold">SECURE CHECKOUT</text>

    <!-- Payment Option -->
    <rect x="25" y="115" width="170" height="45" rx="10" fill="#0d241d" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="45" cy="137.5" r="12" fill="#10b981"/>
    <text x="41" y="142" fill="#000" font-family="sans-serif" font-size="12" font-weight="bold">₹</text>
    <text x="68" y="134" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">UPI 1-Tap Pay</text>
    <text x="68" y="147" fill="#10b981" font-family="sans-serif" font-size="9">Razorpay / Cashfree</text>

    <!-- Success Badge -->
    <rect x="40" y="180" width="140" height="90" rx="12" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-dasharray="4,4"/>
    <circle cx="110" cy="215" r="18" fill="#10b981"/>
    <path d="M102 215 L108 221 L118 209" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="110" y="250" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Payment Success</text>
    <text x="110" y="263" fill="#10b981" font-family="sans-serif" font-size="9" text-anchor="middle">₹14,999.00</text>
  </g>

  <!-- Floating Metallic Credit Card -->
  <g transform="translate(420, 110)">
    <rect x="0" y="0" width="280" height="175" rx="16" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="25" y="30" width="40" height="30" rx="6" fill="#fbbf24" opacity="0.8"/>
    <text x="25" y="110" fill="#ffffff" font-family="monospace" font-size="14" letter-spacing="3">4512 •••• •••• 8890</text>
    <text x="25" y="145" fill="#a7f3d0" font-family="sans-serif" font-size="10" font-weight="bold">VALUED D2C MERCHANTS</text>
    <text x="220" y="145" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold">VISA</text>
  </g>

  <!-- Provider Badges -->
  <g transform="translate(420, 310)">
    <rect x="0" y="0" width="80" height="35" rx="8" fill="#0d1b2a" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="40" y="22" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Razorpay</text>

    <rect x="95" y="0" width="80" height="35" rx="8" fill="#0d1b2a" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="135" y="22" fill="#a855f7" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Cashfree</text>

    <rect x="190" y="0" width="80" height="35" rx="8" fill="#0d1b2a" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="230" y="22" fill="#10b981" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PhonePe</text>
  </g>

  <!-- Top Title Banner -->
  <rect x="30" y="30" width="300" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="180" y="50" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">INDIAN PAYMENT GATEWAYS 2026</text>
</svg>
