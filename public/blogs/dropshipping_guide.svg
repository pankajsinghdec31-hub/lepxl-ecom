<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c18"/>
      <stop offset="50%" stop-color="#0f1b30"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- World Nodes Connections -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.3"/>
  <circle cx="400" cy="250" r="110" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Center Laptop Graphic -->
  <g transform="translate(260, 140)">
    <rect x="0" y="0" width="280" height="170" rx="12" fill="#091424" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <!-- Screen Header -->
    <rect x="10" y="10" width="260" height="25" rx="6" fill="#0e233d"/>
    <text x="25" y="27" fill="#10b981" font-family="sans-serif" font-size="10" font-weight="bold">DROPSHIPPING DASHBOARD</text>
    
    <!-- Stats Row -->
    <rect x="15" y="45" width="75" height="40" rx="6" fill="#0e2820" stroke="#10b981" stroke-width="1"/>
    <text x="25" y="60" fill="#a7f3d0" font-family="sans-serif" font-size="8">Orders Today</text>
    <text x="25" y="76" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">248</text>

    <rect x="100" y="45" width="75" height="40" rx="6" fill="#0e2820" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="60" fill="#a7f3d0" font-family="sans-serif" font-size="8">Net Profit</text>
    <text x="110" y="76" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="bold">₹42,500</text>

    <rect x="185" y="45" width="80" height="40" rx="6" fill="#0e2820" stroke="#10b981" stroke-width="1"/>
    <text x="193" y="60" fill="#a7f3d0" font-family="sans-serif" font-size="8">RTO Rate</text>
    <text x="193" y="76" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold">&lt; 8.2%</text>

    <!-- Supplier Connection Pins -->
    <rect x="15" y="95" width="250" height="60" rx="8" fill="#08182b"/>
    <text x="25" y="115" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">Fulfillment Partners:</text>
    <text x="25" y="132" fill="#a7f3d0" font-family="sans-serif" font-size="9">Roposo Clout • GlowRoad • Baapstore</text>

    <!-- Laptop Base -->
    <path d="M -20 170 H 300 L 320 185 H -40 Z" fill="#0b172a" stroke="#10b981" stroke-width="1.5"/>
  </g>

  <!-- Title Badge -->
  <rect x="30" y="30" width="300" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="180" y="50" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">INDIAN DROPSHIPPING GUIDE 2026</text>
</svg>
