<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030605"/>
      <stop offset="50%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#020403"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Pedestal -->
  <polygon points="250,380 550,380 500,450 300,450" fill="#0d1f19" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Luxury Diamond Emblem -->
  <g transform="translate(400, 200)">
    <polygon points="0,-70 50,0 0,70 -50,0" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="18" fill="#10b981" opacity="0.8" filter="url(#glow)"/>
    <text x="0" y="6" fill="#000000" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle">◆</text>
  </g>

  <!-- Crown / Star Accent -->
  <path d="M 360 90 L 380 110 L 400 80 L 420 110 L 440 90 L 430 120 H 370 Z" fill="url(#gold)"/>

  <!-- Text -->
  <text x="400" y="320" fill="#ffffff" font-family="serif" font-size="28" font-weight="normal" text-anchor="middle" letter-spacing="4">LUXURY SHOPIFY STORE</text>
  <text x="400" y="350" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="3">EDITORIAL & HIGH AOV DESIGN</text>

  <!-- Title Badge -->
  <rect x="30" y="30" width="300" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="180" y="50" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">LUXURY BRANDING ARCHITECTURE</text>
</svg>
